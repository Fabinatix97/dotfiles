# Prefix and keybindings
set -g prefix C-s
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# General
set -g mouse on
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Style
gray_light="#D8DEE9"
gray_dark="#3B4252"
green_soft="#C3E88D"
blue_muted="#81A1C1"
cyan_soft="#86E1FC"

set -g status-position top
set -g status-left-length 100
set -g status-style "bg=default"
set -g status-left " #[fg=${green_soft},bold] #S | "
set -g status-right ""
set -g window-status-current-format "#[fg=${cyan_soft},bold]  #[underscore]#I:#W"
set -g window-status-format "#I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

